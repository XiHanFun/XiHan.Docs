# 名称
name: 部署文档

# 触发条件：在 push 和 pull 到 main 分支后
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 任务
jobs:
  deploy-gh-pages:
    # 服务器环境：最新版 Ubuntu
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src/

    steps:
      - name: 拉取代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 安装 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: 安装 pnpm
        run: npm install -g pnpm@11

      - name: 安装依赖
        run: pnpm install

      - name: 构建文档
        run: pnpm run build

      - name: 部署文档
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          # 这是文档部署到的分支名称
          branch: gh-pages
          folder: ./src/.vitepress/dist
